version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: hva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: hva-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit.yaml:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hva-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface

  voice-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hva-voice-agent
    restart: unless-stopped
    env_file:
      - .env
    command: python -m app.worker.voice_agent
    depends_on:
      backend:
        condition: service_started
      livekit:
        condition: service_started
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hva-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
      FRONTEND_LIVEKIT_URL: ${FRONTEND_LIVEKIT_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  model_cache:
